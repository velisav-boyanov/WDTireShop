
<!-- HEAD -->
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=0.1">
    <title>Tire Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <script src="https://unpkg.com/vue@3"></script>
</head>

<body>
    <!-- FRONT -->
    <nav class="navbar navbar-expand-lg"
    :class="navbarClasses">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">VNL Tires</a>
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li v-for="(page, index) in pages" class="nav-item" :key="index">
                    <a 
                    class="nav-link"
                    :class="{active: activePage == index}" 
                    aria-current="page" 
                    href="page.link.url"
                    :title="`This link goes here ${page.link.text}`"
                    @click.prevent="activePage = index">
                        {{ page.link.text }}
                    </a>
                </li>
            </ul>
            <form class="d-flex">
                <button class="btn btn-primary"
                @click.prevent="useDarkNavbar = !useDarkNavbar">
                Toogle navbar</button>
            </form>
        </div>
    </nav>
    <div id="content" class="container">
        <h1>{{ pages[activePage].pageTitle }}</h1>
        <p>{{ pages[activePage].content }}</p>
    </div>

    <!-- BACK -->
    <script>
        Vue.createApp({
            data() {
                return{
                    activePage : 0,
                    useDarkNavbar: false,
                    pages : [
                        {
                            link: {text: 'Home', url: 'index.html'},
                            pageTitle: 'Home Page',
                            content:  'This is the home page content'
                        }, 
                        {
                            link: {text: 'About', url: 'about.html'},
                            pageTitle: 'About Page',
                            content:  'This is the about page content'
                        },
                        {
                            link: {text: 'Contact', url: 'contact.html'},
                            pageTitle: 'Contact Page',
                            content:  'This is the contact page content'
                        }
                    ]
                }    
            },
            computed: {
                navbarClasses() {
                    return {
                        'navbar-light': !this.useDarkNavbar,
                        'bg-light' : !this.useDarkNavbar,
                        'navbar-dark': this.useDarkNavbar,
                        'bg-dark' : this.useDarkNavbar
                    }
                }    
            }    
        }).mount('body')
    </script>
</body>
