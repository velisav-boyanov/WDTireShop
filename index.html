
<!-- HEAD -->
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=0.1">
    <title>Tire Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<!-- FRONT -->
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">V+N=VNL Tires</a>
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li v-for="(link, index) in links" class="nav-item" :key="index">
                    <a 
                    class="nav-link" 
                    aria-current="page" 
                    :href="link.url"
                    :title="`This link goes here ${link.text}`">
                        {{ link.text }}
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <div id="app" class="container">
        <h1>
            {{ header }}
        </h1>
        <h3>
            {{ content }}
        </h3>
    </div>

</body>

<!-- BACK -->
<script>
  const { createApp, ref } = Vue
  createApp({
    setup() {
        const links = [
            {text:'Home', url:'index.html'}, 
            {text:'About', url:'about.html'}, 
            {text:'Contact', url:'contact.html'}
        ]
        const header = ref('Hello vue!')
        const content = ref('2nd ala bala.')
        return {
            links,
            header,
            content
        }
    }
  }).mount('body')
</script>
